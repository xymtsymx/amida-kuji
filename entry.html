<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あみだくじ — エントリー</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1209;
  --paper: #fdf8f0;
  --red: #c8392b;
  --gold: #c9890a;
  --light-gold: #fdf0cc;
  --green: #2d6a4f;
  --border: rgba(26,18,9,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-pattern {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(201,137,10,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(200,57,43,0.05) 0%, transparent 50%);
}
.bg-dots {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(circle, rgba(26,18,9,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
}

header { text-align: center; margin-bottom: 2.5rem; }
.badge {
  display: inline-block;
  background: var(--red); color: white;
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  padding: 4px 14px; border-radius: 999px;
  margin-bottom: 0.75rem;
}
h1 {
  font-size: 32px; font-weight: 900;
  line-height: 1.2; color: var(--ink);
  margin-bottom: 0.4rem;
}
h1 span { color: var(--red); }
.sub { font-size: 14px; color: rgba(26,18,9,0.55); }

.progress-section { margin-bottom: 2rem; }
.progress-label {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 13px; color: rgba(26,18,9,0.6);
  margin-bottom: 8px;
}
.progress-label strong { font-size: 20px; font-weight: 900; color: var(--red); }
.progress-bar-outer {
  height: 10px; background: rgba(26,18,9,0.08);
  border-radius: 999px; overflow: hidden;
}
.progress-bar-inner {
  height: 100%; background: linear-gradient(90deg, var(--gold), var(--red));
  border-radius: 999px;
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.slots-grid {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 10px;
}
.slot-dot {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: rgba(26,18,9,0.3);
  background: white; transition: all 0.3s;
  overflow: hidden;
}
.slot-dot.filled {
  background: var(--light-gold);
  border-color: var(--gold);
  color: var(--gold);
  font-size: 10px;
  animation: dotPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes dotPop { from { transform: scale(0); } to { transform: scale(1); } }

.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.75rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 2px 20px rgba(26,18,9,0.06);
}

.card-title {
  font-size: 13px; font-weight: 700; color: rgba(26,18,9,0.45);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 1rem;
}

.name-display {
  text-align: center; padding: 1rem;
  background: var(--light-gold);
  border-radius: 12px; margin-bottom: 1.25rem;
  border: 1px solid rgba(201,137,10,0.2);
}
.name-display .who { font-size: 13px; color: var(--gold); font-weight: 700; margin-bottom: 4px; }
.name-display .name-val { font-size: 28px; font-weight: 900; color: var(--ink); }

.input-wrap { position: relative; margin-bottom: 1rem; }
.name-input {
  width: 100%; padding: 14px 18px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 20px; font-weight: 700;
  border: 2px solid var(--border); border-radius: 14px;
  background: white; color: var(--ink);
  outline: none; transition: border-color 0.2s;
  text-align: center;
}
.name-input:focus { border-color: var(--gold); }
.name-input::placeholder { color: rgba(26,18,9,0.2); font-weight: 400; }

.submit-btn {
  width: 100%; padding: 16px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 17px; font-weight: 900;
  background: var(--red); color: white;
  border: none; border-radius: 14px;
  cursor: pointer; letter-spacing: 0.06em;
  transition: transform 0.15s, background 0.15s;
  position: relative; overflow: hidden;
}
.submit-btn:hover { background: #a82d20; }
.submit-btn:active { transform: scale(0.97); }
.submit-btn:disabled { background: rgba(26,18,9,0.15); cursor: not-allowed; }

.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: rgba(26,18,9,0.03); border-radius: 10px;
  animation: slideIn 0.3s ease both;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: none; } }
.history-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--light-gold); color: var(--gold);
  font-size: 11px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.history-name { font-size: 15px; font-weight: 700; }
.history-check { margin-left: auto; color: var(--green); font-size: 16px; }

.complete-section {
  display: none; text-align: center; padding: 1rem 0;
}
.complete-section.show { display: block; }
.complete-icon { font-size: 48px; margin-bottom: 0.75rem; animation: bounce 0.6s ease; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
.complete-title { font-size: 22px; font-weight: 900; margin-bottom: 0.5rem; }
.complete-sub { font-size: 14px; color: rgba(26,18,9,0.55); margin-bottom: 1.5rem; }

.result-url-box {
  background: var(--light-gold);
  border: 1.5px dashed var(--gold);
  border-radius: 14px; padding: 1rem;
  margin-bottom: 1rem;
  word-break: break-all; font-size: 12px;
  color: var(--gold); font-weight: 700;
  cursor: pointer; transition: background 0.2s;
}
.result-url-box:hover { background: #fae9a0; }

.open-btn {
  display: block; width: 100%; padding: 16px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 17px; font-weight: 900;
  background: var(--green); color: white;
  border: none; border-radius: 14px;
  cursor: pointer; letter-spacing: 0.06em;
  text-decoration: none; text-align: center;
  transition: transform 0.15s, background 0.15s;
  margin-bottom: 8px;
}
.open-btn:hover { background: #1e4d38; }
.open-btn:active { transform: scale(0.97); }

.copy-btn {
  display: block; width: 100%; padding: 12px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 14px; font-weight: 700;
  background: white; color: var(--ink);
  border: 1.5px solid var(--border); border-radius: 14px;
  cursor: pointer; transition: background 0.15s;
}
.copy-btn:hover { background: var(--light-gold); }

.turn-indicator {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: rgba(26,18,9,0.5);
  margin-bottom: 0.75rem;
}
.turn-arrow { color: var(--red); font-weight: 900; }

.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--ink); color: white;
  padding: 12px 24px; border-radius: 999px;
  font-size: 14px; font-weight: 700;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 999; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-dots"></div>
<div class="wrap">
  <header>
    <div class="badge">🎁 プレゼント抽選</div>
    <h1>あみだ<span>くじ</span></h1>
    <p class="sub">順番に名前を入力してエントリーしよう！</p>
  </header>

  <div class="progress-section">
    <div class="progress-label">
      <span>エントリー済み</span>
      <strong id="count">0</strong><span style="font-size:13px;color:rgba(26,18,9,0.6);"> / 9人</span>
    </div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="pbar" style="width:0%"></div>
    </div>
    <div class="slots-grid" id="slots-grid"></div>
  </div>

  <div id="entry-section">
    <div class="card">
      <div class="turn-indicator">
        <span class="turn-arrow">▶</span>
        <span id="turn-label">1人目がエントリー中</span>
      </div>
      <div class="input-wrap">
        <input class="name-input" type="text" id="name-input" placeholder="名前を入力" maxlength="8" autocomplete="off" />
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitName()">エントリーする！</button>
    </div>

    <div class="card" id="history-card" style="display:none;">
      <div class="card-title">エントリー済み</div>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

  <div class="complete-section" id="complete-section">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">全員エントリー完了！</div>
    <div class="complete-sub">下のボタンを押して結果発表ページを開こう</div>
    <div class="result-url-box" id="result-url-box" onclick="copyUrl()">URLを生成中...</div>
    <a class="open-btn" id="open-result-btn" href="#" target="_blank">結果発表ページを開く 🎊</a>
    <button class="copy-btn" onclick="copyUrl()">URLをコピーしてシェア</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOTAL = 9;
let entries = [];

function initSlots() {
  const grid = document.getElementById('slots-grid');
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'slot-dot';
    d.id = 'dot-' + i;
    d.textContent = i + 1;
    grid.appendChild(d);
  }
}

function updateProgress() {
  const n = entries.length;
  document.getElementById('count').textContent = n;
  document.getElementById('pbar').style.width = (n / TOTAL * 100) + '%';
  entries.forEach((e, i) => {
    const dot = document.getElementById('dot-' + i);
    if (dot) {
      dot.classList.add('filled');
      dot.textContent = e.slice(0, 2);
    }
  });
}

function updateHistory() {
  const n = entries.length;
  if (n === 0) return;
  document.getElementById('history-card').style.display = 'block';
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  entries.forEach((name, i) => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.style.animationDelay = '0s';
    item.innerHTML = `<div class="history-num">${i+1}</div><div class="history-name">${name}</div><div class="history-check">✓</div>`;
    list.appendChild(item);
  });
}

function updateTurnLabel() {
  const n = entries.length;
  if (n < TOTAL) {
    document.getElementById('turn-label').textContent = `${n + 1}人目がエントリー中`;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function submitName() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) { showToast('名前を入力してね！'); return; }
  if (entries.includes(name)) { showToast('同じ名前は登録できません'); return; }

  entries.push(name);
  input.value = '';
  updateProgress();
  updateHistory();

  if (entries.length >= TOTAL) {
    showComplete();
  } else {
    updateTurnLabel();
    showToast(`${name} さんのエントリー完了！`);
    input.focus();
  }
}

function showComplete() {
  document.getElementById('entry-section').style.display = 'none';
  const cs = document.getElementById('complete-section');
  cs.classList.add('show');

  const url = buildResultUrl();
  document.getElementById('result-url-box').textContent = url;
  document.getElementById('open-result-btn').href = url;
}

function buildResultUrl() {
  const base = location.href.replace('entry.html', 'result.html');
  const data = btoa(encodeURIComponent(JSON.stringify(entries)));
  return base.split('#')[0].replace('entry.html', 'result.html') + '#' + data;
}

function copyUrl() {
  const url = buildResultUrl();
  navigator.clipboard.writeText(url).then(() => showToast('URLをコピーしました！'));
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});

initSlots();
</script>
</body>
</html>

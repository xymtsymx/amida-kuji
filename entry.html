<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あみだくじ — エントリー</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1928;
    --surface2: #242336;
    --accent: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --text: #fffffe;
    --text-muted: #a7a9be;
    --border: rgba(255,255,255,0.08);
    --purple: #7c5cbf;
    --purple-light: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute; border-radius: 50%;
    background: white; animation: twinkle var(--d, 3s) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.4); }
  }
  .container {
    position: relative; z-index: 1;
    max-width: 560px; margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }
  .header {
    text-align: center; margin-bottom: 2.5rem;
    animation: fadeDown 0.7s ease both;
  }
  .gift-icon {
    font-size: 52px; display: block; margin-bottom: 0.5rem;
    animation: bounce 2s infinite ease-in-out;
  }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .header h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .header p { color: var(--text-muted); font-size: 14px; line-height: 1.7; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem;
    margin-bottom: 1.25rem;
    animation: fadeUp 0.6s ease both;
  }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .card-label {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--purple-light); font-weight: 700; margin-bottom: 0.75rem;
  }
  .name-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 18px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    transition: border-color 0.2s;
  }
  .name-input:focus { outline: none; border-color: var(--purple-light); }
  .name-input::placeholder { color: var(--text-muted); font-size: 15px; }

  .slots-label {
    font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.6;
  }
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 6px;
  }
  .slot-btn {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
    padding: 4px;
  }
  .slot-btn:hover:not(.taken):not(.selected) {
    border-color: var(--accent2);
    background: rgba(255,217,61,0.12);
    color: var(--accent2);
    transform: scale(1.08);
  }
  .slot-btn.selected {
    border-color: var(--accent2);
    background: rgba(255,217,61,0.2);
    color: var(--accent2);
    transform: scale(1.05);
  }
  .slot-btn.taken {
    border-color: transparent;
    background: rgba(124,92,191,0.2);
    cursor: not-allowed;
    opacity: 0.7;
  }
  .slot-btn .slot-num { font-size: 14px; font-weight: 700; }
  .slot-btn .slot-name { font-size: 9px; font-weight: 500; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slot-btn.taken .slot-name { color: var(--purple-light); }

  .submit-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #1a0a00;
    font-size: 17px;
    font-weight: 700;
    font-family: 'Zen Maru Gothic', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,107,0.35); }
  .submit-btn:active:not(:disabled) { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .entries-list {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .entry-chip {
    padding: 5px 12px;
    border-radius: 999px;
    background: rgba(124,92,191,0.25);
    border: 1px solid rgba(167,139,250,0.3);
    font-size: 12px; color: var(--purple-light);
    display: flex; align-items: center; gap: 6px;
  }
  .entry-chip .num {
    background: var(--purple);
    color: white;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
  }

  .success-screen {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
    animation: fadeUp 0.6s ease both;
  }
  .success-screen.show { display: block; }
  .success-icon { font-size: 72px; margin-bottom: 1rem; animation: successPop 0.5s ease both; }
  @keyframes successPop { 0%{transform:scale(0) rotate(-20deg)} 70%{transform:scale(1.2) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }
  .success-screen h2 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 26px;
    background: linear-gradient(135deg, var(--accent3), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1rem;
  }
  .success-screen p { color: var(--text-muted); font-size: 15px; line-height: 1.8; }
  .success-screen .name-highlight {
    color: var(--accent2);
    font-weight: 700;
    -webkit-text-fill-color: var(--accent2);
  }

  .loading-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,14,23,0.85);
    z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-muted); font-size: 14px; }

  .count-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(107,203,119,0.15);
    border: 1px solid rgba(107,203,119,0.3);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 12px; color: var(--accent3);
    margin-bottom: 1rem;
  }
  .count-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .error-msg {
    background: rgba(255,107,107,0.12);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--accent);
    margin-top: 0.75rem;
    display: none;
  }
  .error-msg.show { display: block; }
  .full-msg {
    text-align: center; padding: 2rem;
    color: var(--text-muted); font-size: 15px; line-height: 1.8;
  }
  .full-msg .big { font-size: 48px; display: block; margin-bottom: 0.75rem; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">読み込み中...</div>
</div>

<div class="container" id="main-container">
  <div class="header">
    <span class="gift-icon">🎁</span>
    <h1>あみだくじ</h1>
    <p>好きな番号を選んでエントリーしよう！<br>6人にプレゼントが当たります🎉</p>
  </div>

  <div id="entry-form">
    <div class="card">
      <div class="card-label">あなたの名前</div>
      <input class="name-input" type="text" id="name-input" placeholder="例：山田 太郎" maxlength="10" />
      <div class="error-msg" id="name-error">名前を入力してください</div>
    </div>

    <div class="card">
      <div class="card-label">あみだの場所を選ぶ</div>
      <p class="slots-label">1〜9の番号から、好きな場所を1つ選んでね。すでに誰かが選んだ場所は選べません。</p>
      <div id="entries-display" style="margin-bottom:1rem; display:none;">
        <div class="count-badge"><span class="count-dot"></span><span id="entry-count">0</span>人がエントリー済み</div>
        <div class="entries-list" id="entries-list"></div>
      </div>
      <div class="slots-grid" id="slots-grid"></div>
      <div class="error-msg" id="slot-error">番号を選んでください</div>
    </div>

    <button class="submit-btn" id="submit-btn" disabled>エントリーする 🎯</button>
  </div>

  <div class="success-screen" id="success-screen">
    <div class="success-icon">✨</div>
    <h2>エントリー完了！</h2>
    <p><span class="name-highlight" id="success-name"></span> さん、<br>番号 <span class="name-highlight" id="success-slot"></span> でエントリーしました！<br><br>結果を楽しみにしててね 🎁<br>みんなのエントリーが終わったら<br>主催者から結果発表のURLが届くよ！</p>
  </div>

  <div class="full-msg" id="full-msg" style="display:none;">
    <span class="big">🎉</span>
    9人全員のエントリーが完了しました！<br>主催者から結果発表のURLが届くのをお待ちください。
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ========== Firebase設定 (ここを書き換えてください) ==========
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
// ===========================================================

const TOTAL = 9;
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const entriesRef = ref(db, 'entries');

let entries = {}; // { slotIndex: { name, slot } }
let selectedSlot = null;

const loading = document.getElementById('loading');
const nameInput = document.getElementById('name-input');
const slotsGrid = document.getElementById('slots-grid');
const submitBtn = document.getElementById('submit-btn');
const nameError = document.getElementById('name-error');
const slotError = document.getElementById('slot-error');
const entryForm = document.getElementById('entry-form');
const successScreen = document.getElementById('success-screen');
const fullMsg = document.getElementById('full-msg');
const entriesDisplay = document.getElementById('entries-display');
const entriesList = document.getElementById('entries-list');
const entryCount = document.getElementById('entry-count');

function showLoading(text='読み込み中...') {
  loading.querySelector('.loading-text').textContent = text;
  loading.classList.add('show');
}
function hideLoading() { loading.classList.remove('show'); }

function renderSlots() {
  slotsGrid.innerHTML = '';
  const takenSlots = Object.keys(entries).map(Number);
  for (let i = 0; i < TOTAL; i++) {
    const btn = document.createElement('button');
    btn.className = 'slot-btn' + (takenSlots.includes(i) ? ' taken' : '') + (selectedSlot === i ? ' selected' : '');
    const takenEntry = entries[i];
    btn.innerHTML = `<span class="slot-num">${i+1}</span>${takenEntry ? `<span class="slot-name">${takenEntry.name}</span>` : ''}`;
    if (!takenSlots.includes(i)) {
      btn.onclick = () => {
        selectedSlot = i;
        renderSlots();
        slotError.classList.remove('show');
        updateSubmitBtn();
      };
    }
    slotsGrid.appendChild(btn);
  }
}

function renderEntries() {
  const count = Object.keys(entries).length;
  if (count === 0) { entriesDisplay.style.display = 'none'; return; }
  entriesDisplay.style.display = 'block';
  entryCount.textContent = count;
  entriesList.innerHTML = '';
  Object.entries(entries).sort((a,b) => a[0]-b[0]).forEach(([slot, data]) => {
    const chip = document.createElement('div');
    chip.className = 'entry-chip';
    chip.innerHTML = `<span class="num">${parseInt(slot)+1}</span>${data.name}`;
    entriesList.appendChild(chip);
  });
}

function updateSubmitBtn() {
  const name = nameInput.value.trim();
  submitBtn.disabled = !(name && selectedSlot !== null);
}

nameInput.addEventListener('input', () => {
  nameError.classList.remove('show');
  updateSubmitBtn();
});

submitBtn.addEventListener('click', async () => {
  const name = nameInput.value.trim();
  if (!name) { nameError.classList.add('show'); return; }
  if (selectedSlot === null) { slotError.classList.add('show'); return; }
  if (entries[selectedSlot]) { slotError.classList.add('show'); return; }

  showLoading('エントリー中...');
  try {
    const snap = await get(entriesRef);
    const current = snap.val() || {};
    if (current[selectedSlot]) {
      hideLoading();
      slotError.textContent = 'その番号はすでに選ばれています。別の番号を選んでください。';
      slotError.classList.add('show');
      selectedSlot = null;
      renderSlots();
      return;
    }
    current[selectedSlot] = { name };
    await set(entriesRef, current);
    hideLoading();
    document.getElementById('success-name').textContent = name;
    document.getElementById('success-slot').textContent = selectedSlot + 1;
    entryForm.style.display = 'none';
    successScreen.classList.add('show');
    launchMini();
  } catch(e) {
    hideLoading();
    alert('エラーが発生しました。もう一度お試しください。');
  }
});

onValue(entriesRef, (snap) => {
  entries = snap.val() || {};
  renderSlots();
  renderEntries();
  if (Object.keys(entries).length >= TOTAL && entryForm.style.display !== 'none' && !successScreen.classList.contains('show')) {
    entryForm.style.display = 'none';
    fullMsg.style.display = 'block';
  }
});

function launchMini() {
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:fixed;width:8px;height:8px;border-radius:${Math.random()>0.5?'50%':'2px'};background:${['#ffd93d','#ff6b6b','#6bcb77','#a78bfa'][Math.floor(Math.random()*4)]};left:${Math.random()*100}vw;top:-10px;z-index:200;animation:fall ${1+Math.random()*2}s linear ${Math.random()*0.5}s both`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 3000);
  }
}

// Star background
function createStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    const size = Math.random() * 2.5 + 1;
    s.className = 'star';
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    c.appendChild(s);
  }
}
createStars();

const fallStyle = document.createElement('style');
fallStyle.textContent = `@keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}`;
document.head.appendChild(fallStyle);

showLoading();
setTimeout(hideLoading, 1200);
</script>
</body>
</html>
